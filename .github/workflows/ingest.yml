name: Ingest YouTube videos

on:
  schedule:
    # Daily at 00:00 UTC (= 09:00 JST). Sunao Pharmaceutical's channel does not
    # publish hourly, so hourly polling is wasted budget + noisy failure pings.
    # Manual `workflow_dispatch` is still available for ad-hoc runs.
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      video_ids:
        description: 'Optional space-separated YouTube IDs for backfill'
        required: false
        type: string

# Prevent overlapping runs — ingest is not safe to parallelise (race on UPSERT
# could leave a half-written video with is_active=true).
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/ingest/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/ingest/requirements.txt

      # YouTube changes its extraction backend every few weeks and any cached
      # yt-dlp quickly becomes stale (Bot-detection / "Sign in to confirm you're
      # not a bot" errors). Always pull the latest yt-dlp on top of the
      # requirements pin, regardless of pip cache state.
      - name: Force-upgrade yt-dlp to latest
        run: pip install --upgrade --no-cache-dir yt-dlp

      # TEMPORARY DEBUG: diagnose persistent "RSS parse error" failure.
      # Prints only length + first 4 / last 2 chars of the secret (never the
      # full value), then probes the actual RSS endpoint to separate
      # "wrong channel id" from "YouTube blocking GitHub IPs".
      # Remove this step once the root cause is identified.
      - name: DEBUG — verify YOUTUBE_CHANNEL_ID and RSS reachability
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
        run: |
          LEN=${#YOUTUBE_CHANNEL_ID}
          HEAD="${YOUTUBE_CHANNEL_ID:0:4}"
          TAIL="${YOUTUBE_CHANNEL_ID: -2}"
          echo "=== Secret value (masked) ==="
          echo "Length     : $LEN chars  (expected 24)"
          echo "First 4    : [$HEAD]     (expected UCuA)"
          echo "Last  2    : [$TAIL]     (expected Qg)"
          if [ "${YOUTUBE_CHANNEL_ID:0:2}" = "UC" ]; then
            echo "Prefix OK  : starts with UC"
          else
            echo "Prefix BAD : does NOT start with UC"
          fi

          echo
          echo "=== Probing YouTube RSS endpoint ==="
          URL="https://www.youtube.com/feeds/videos.xml?channel_id=${YOUTUBE_CHANNEL_ID}"
          STATUS=$(curl -s -o /tmp/rss.xml -w "%{http_code}" \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            "$URL" || echo "curl_failed")
          CT=$(curl -s -o /dev/null -w "%{content_type}" \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            "$URL")
          SIZE=$(wc -c < /tmp/rss.xml)
          echo "HTTP status : $STATUS  (200 = OK, 404 = bad id or blocked)"
          echo "Content-Type: $CT      (text/xml = OK, text/html = error page)"
          echo "Body size   : $SIZE bytes"
          echo "--- First 5 lines of body ---"
          head -5 /tmp/rss.xml
          echo "--- End ---"

      - name: Run ingest pipeline
        working-directory: scripts/ingest
        env:
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "${{ inputs.video_ids }}" ]; then
            python pipeline.py ${{ inputs.video_ids }}
          else
            python pipeline.py
          fi
